name: Extract Hatena Design

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Data source"
        required: true
        default: "archive"
        type: choice
        options:
          - archive
          - direct
      screenshot:
        description: "Take screenshots & extract computed styles"
        required: false
        default: true
        type: boolean

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Chromium は ubuntu-latest に google-chrome-stable がプリインストール済み
      - name: Extract design data
        run: |
          ARGS=""
          if [ "${{ inputs.source }}" = "archive" ]; then
            ARGS="$ARGS --archive"
          fi
          if [ "${{ inputs.screenshot }}" = "true" ]; then
            ARGS="$ARGS --screenshot"
          fi
          node scripts/extract-hatena-design.mjs $ARGS
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable

      - name: Update design.md from extracted data
        run: node scripts/update-design-doc.mjs

      - name: Upload raw HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hatena-raw-html
          path: docs/design/raw/
          retention-days: 30

      - name: Upload screenshots as artifact
        if: inputs.screenshot
        uses: actions/upload-artifact@v4
        with:
          name: hatena-screenshots
          path: docs/design/screenshots/
          retention-days: 90

      - name: Create PR with updated design docs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/design/tokens.json docs/design/structure.json docs/design/design.md docs/design/computed-*.json

          if git diff --cached --quiet; then
            echo "No changes detected, skipping PR creation"
            exit 0
          fi

          BRANCH="design/update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "docs: update design tokens & docs from hatena (${{ inputs.source }})"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "docs: update hatena design tokens ($(date +%Y-%m-%d))" \
            --body "$(cat <<'EOF'
          ## Summary
          - `extract-hatena-design.mjs` でデザイン情報を再抽出 (source: ${{ inputs.source }})
          - `update-design-doc.mjs` で `design.md` に反映

          ## 変更ファイル
          - `docs/design/tokens.json` - デザイントークン (extracted + semantic)
          - `docs/design/structure.json` - UI構造データ
          - `docs/design/design.md` - デザインリファレンスドキュメント

          ## 確認ポイント
          - [ ] 抽出されたカラー値が妥当か
          - [ ] semantic トークンの変更が意図通りか
          - [ ] カテゴリ・エントリー構造に変化があるか

          _Auto-generated by [Extract Hatena Design](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow_
          EOF
          )"
